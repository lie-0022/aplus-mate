<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CourseDetail — 기존 vs 수정 (전체 화면 구조)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.min.css");
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#9c9a92;font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;letter-spacing:-0.01em;padding:28px 20px}
  .theme{padding:20px;border-radius:20px;margin-bottom:26px}
  .theme.light{background:#cfccc3}
  .theme.dk{background:#0b0f22}
  .thlabel{font-size:17px;font-weight:800;margin-bottom:14px}
  .light .thlabel{color:#23221c}.dk .thlabel{color:#c9cef0}
  .sub{font-size:13px;font-weight:800;margin:16px 0 10px}
  .light .sub{color:#4a4840}.dk .sub{color:#8e95c4}
  .grp{font-size:14px;font-weight:900;margin:22px 0 4px;padding-bottom:6px;border-bottom:2px solid}
  .light .grp{color:#2b2a22;border-color:#b9b5aa}.dk .grp{color:#aeb5e6;border-color:#2a3160}
  .row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;margin-bottom:8px}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px}
  .cap{font-size:12px;font-weight:800}
  .light .cap{color:#3a3830}.dk .cap{color:#aab0dd}
  .cap.n{color:#7a6fe6}

  /* ── theme tokens ── */
  .light{--paper:#FFF6EE;--card:#fff;--ink:#3A3566;--sub2:#8E88A8;--primary:#5D51C8;--soft:#EFE9FB;
    --border:#F0E8DD;--tagb:#F1EDE6;--tagf:#7E7869;--inb:#E4DCF3;--tabbg:#F1EDE6;--tabon:#fff;--hdr:#fff;
    --navmut:#C6BFB2;--sh:0 5px 18px rgba(150,120,90,.10);
    --notice-b:#FFF3E0;--notice-f:#9A5B12;--pos-b:#E6F4EC;--pos-f:#2E7D51;--onchip:#5D51C8}
  .dk{--paper:#171E3D;--card:#212a54;--ink:#EDEFF9;--sub2:#A6ADD6;--primary:#8fc4ff;--soft:#2A3366;
    --border:#313A68;--tagb:#2E3766;--tagf:#A6ADD6;--inb:#3a4270;--tabbg:#28305c;--tabon:#3a4478;--hdr:#212a54;
    --navmut:#5A5F87;--sh:none;
    --notice-b:rgba(249,233,74,.10);--notice-f:#E6D98B;--pos-b:rgba(120,205,160,.14);--pos-f:#88D3A8;--onchip:#4550a0}

  /* buttons */
  .btnGrad{background:linear-gradient(92deg,#7A2FE6,#2E7DF0);color:#fff;border:none;border-radius:8px;font-weight:700}
  .btnSolid{background:#5D51C8;color:#fff;border:none;border-radius:9px;font-weight:800}
  .dk .btnSolid{background:linear-gradient(92deg,#7A2FE6,#2E7DF0)}
  .obtn{background:var(--card);border:1px solid var(--border);color:var(--ink);border-radius:8px;font-weight:600}
  .softbtn{background:var(--soft);color:var(--primary);border:none;border-radius:9px;font-weight:800}
  .sm{font-size:11px;padding:6px 11px;display:inline-flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;flex-shrink:0}
  .xs{font-size:10px;padding:5px 10px;display:inline-flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;flex-shrink:0}
  .lg{font-size:12px;padding:9px 16px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;flex-shrink:0}

  /* ══ 모바일 프레임 (340×737 = 9:19.5) ══ */
  .ph{width:340px;height:737px;background:var(--paper);border-radius:34px;overflow:hidden;
    box-shadow:0 14px 34px rgba(0,0,0,.30);display:flex;flex-direction:column;color:var(--ink)}
  .mhead{height:52px;background:var(--hdr);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
  .mhead img{height:20px;width:auto;display:block}
  .mhead .hic{display:flex;align-items:center;gap:12px;font-size:18px;color:var(--sub2)}
  .mhead .av{width:26px;height:26px;border-radius:50%;background:var(--soft);color:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
  .mbody{flex:1;padding:13px 15px;overflow:hidden;display:flex;flex-direction:column;gap:9px}
  .mtabs{height:60px;background:var(--hdr);border-top:1px solid var(--border);flex-shrink:0;
    display:flex;justify-content:space-around;align-items:center;padding-bottom:6px}
  .mtab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;color:var(--navmut)}
  .mtab i{font-size:20px}
  .mtab.on{color:var(--primary)}

  /* ══ PC 프레임 (720×450 = 16:10) ══ */
  .pc{width:720px;height:450px;background:var(--paper);border-radius:12px;overflow:hidden;
    box-shadow:0 14px 34px rgba(0,0,0,.30);display:flex;flex-direction:column;color:var(--ink)}
  .phead{height:38px;background:var(--hdr);border-bottom:1px solid var(--border);flex-shrink:0;
    display:flex;align-items:center;justify-content:space-between;padding:0 14px}
  .phead img{height:17px;width:auto;display:block}
  .phead .hic{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--sub2)}
  .phead .av{width:21px;height:21px;border-radius:50%;background:var(--soft);color:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
  .pbody{flex:1;display:flex;overflow:hidden}
  .pside{width:118px;background:var(--hdr);border-right:1px solid var(--border);padding:10px 8px;
    display:flex;flex-direction:column;gap:2px;flex-shrink:0}
  .snav{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--sub2);
    padding:7px 9px;border-radius:8px}
  .snav i{font-size:14px}
  .snav.on{background:var(--soft);color:var(--primary)}
  .pmain{flex:1;padding:13px 16px;overflow:hidden}
  .pmain.center .pcen{max-width:384px;margin:0 auto}
  .pcwrap{display:flex;flex-direction:column;gap:10px;height:100%;overflow:hidden}
  .pcGrid{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;align-items:start;overflow:hidden}
  .cgrid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .rail{display:flex;flex-direction:column;gap:9px}
  .railT{font-size:10px;font-weight:800;color:var(--sub2);letter-spacing:.02em}
  .railbtn{background:var(--soft);color:var(--primary);border:none;border-radius:10px;font-size:11px;font-weight:800;padding:9px;display:flex;align-items:center;justify-content:center;gap:5px}
  .railhint{font-size:10px;color:var(--sub2);line-height:1.5;background:var(--card);border-radius:11px;padding:9px 10px;box-shadow:var(--sh)}
  .dk .railhint{border:1px solid var(--border)}

  /* ── shared content ── */
  .back{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub2);font-weight:600}
  .back i{font-size:14px}
  .tabs{display:flex;background:var(--tabbg);border-radius:10px;padding:3px}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;padding:6px;border-radius:8px;color:var(--sub2)}
  .tab i{font-size:13px}
  .tab.on{background:var(--tabon);color:var(--ink)}
  .stack{display:flex;flex-direction:column;gap:8px}
  .rw{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .empty{text-align:center;padding:20px 14px}
  .empty i{font-size:26px;color:var(--sub2);opacity:.55}
  .empty p{font-size:10.5px;color:var(--sub2);margin:9px 0 11px;line-height:1.55}
  .divide{display:flex;align-items:center;gap:8px;margin:1px 0}
  .divide .ln{height:1px;flex:1;background:var(--border)}
  .divide span{font-size:9.5px;color:var(--sub2);white-space:nowrap}

  /* ── 기존(OLD) 카드/요소 ── */
  .cardOld{border:1px solid var(--border);background:var(--card);border-radius:13px;padding:11px}
  .heroOld .hnm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .hnm{font-size:14px;font-weight:800}
  .hmeta{font-size:10.5px;color:var(--sub2);margin-top:3px}
  .verOld{font-size:9px;background:rgba(93,81,200,.12);color:#5D51C8;padding:2px 6px;border-radius:5px;font-weight:700}
  .dk .verOld{background:rgba(143,196,255,.16);color:#8fc4ff}
  .badgeGrad{background:linear-gradient(92deg,#7A2FE6,#2E7DF0);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap}
  .notOld{border:1px solid #FDE68A;background:#FFFBEB;border-radius:12px;padding:10px}
  .notOld .notT{font-size:11.5px;font-weight:700;color:#78350f}
  .notOld .notC{font-size:10px;color:#8a6d2a;margin-top:3px;line-height:1.5}
  .notOld .notM{font-size:9px;color:#a98b4e;margin-top:4px}
  .svOld{border:1px solid rgba(93,81,200,.28);background:rgba(93,81,200,.05);border-radius:12px;padding:10px}
  .dk .svOld{border-color:rgba(143,196,255,.28);background:rgba(143,196,255,.06)}
  .svT{font-size:11.5px;font-weight:600}
  .svM{font-size:9.5px;color:var(--sub2);margin-top:2px}
  .fltOld{display:flex;gap:5px;overflow:hidden;flex:1;min-width:0}
  .fchOld{font-size:10px;font-weight:600;padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--sub2);white-space:nowrap}
  .fchOld.on{background:linear-gradient(92deg,#7A2FE6,#2E7DF0);color:#fff;border:none}
  .catOld{font-size:9.5px;border:1px solid var(--border);color:var(--sub2);padding:2px 7px;border-radius:5px;font-weight:600}
  .views{font-size:9.5px;color:var(--sub2);display:inline-flex;align-items:center;gap:3px}
  .ptitleOld{font-size:12px;font-weight:600;margin-top:6px}
  .pexc{font-size:10px;color:var(--sub2);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pfoot{font-size:9px;color:var(--sub2);margin-top:7px;display:flex;justify-content:space-between;align-items:center}
  .cmOld{font-size:9px;background:rgba(93,81,200,.15);color:#5D51C8;padding:2px 6px;border-radius:5px;font-weight:700}
  .dk .cmOld{background:rgba(143,196,255,.18);color:#8fc4ff}
  .skrow{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
  .stuHd{font-size:11.5px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .skOld{font-size:9.5px;background:var(--tagb);color:var(--tagf);padding:2px 7px;border-radius:5px}
  .skOldOn{font-size:9.5px;background:#5D51C8;color:#fff;padding:2px 7px;border-radius:5px;font-weight:600}
  .dk .skOldOn{background:#8fc4ff;color:#12203f}
  .segOld{display:flex;gap:5px}
  .soBtn{font-size:10.5px;font-weight:600;padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--sub2)}
  .soBtn.on{background:linear-gradient(92deg,#7A2FE6,#2E7DF0);color:#fff;border:none}
  .segDesc{font-size:10px;color:var(--sub2);margin-top:6px;line-height:1.45}
  .recOld{border:1px solid var(--border);background:var(--card);border-radius:12px;padding:10px}
  .recOld .recHd{font-size:11px;font-weight:700}
  .recItemOld{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;margin-top:7px;color:var(--sub2)}
  .ecOld{border:1px dashed var(--border);border-radius:13px}

  /* ── 수정(NEW) 카드/요소 ── */
  .card{background:var(--card);border-radius:14px;padding:11px 12px;box-shadow:var(--sh)}
  .dk .card{border:1px solid var(--border)}
  .hero{background:var(--card);border-radius:15px;padding:12px 13px;box-shadow:var(--sh)}
  .dk .hero{border:1px solid var(--border)}
  .hero .hnm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ver{font-size:9.5px;background:var(--pos-b);color:var(--pos-f);padding:2px 8px;border-radius:20px;font-weight:800;display:inline-flex;align-items:center;gap:3px}
  .ver i{font-size:11px}
  .tagN{background:var(--tagb);color:var(--tagf);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
  .notice{background:var(--notice-b);border-radius:13px;padding:10px 11px;display:flex;gap:9px;align-items:flex-start}
  .notIco{color:var(--notice-f);font-size:16px;flex-shrink:0;margin-top:1px}
  .notice .notT{font-size:11.5px;font-weight:800;color:var(--notice-f)}
  .notice .notC{font-size:10px;color:var(--sub2);margin-top:2px;line-height:1.5}
  .notice .notM{font-size:9px;color:var(--sub2);margin-top:4px}
  .survey{background:var(--soft);border-radius:13px;padding:10px 11px}
  .svL{display:flex;align-items:center;gap:8px;min-width:0}
  .svIco{font-size:16px;color:var(--primary);flex-shrink:0}
  .survey .svT{font-size:11.5px;font-weight:800;color:var(--ink)}
  .survey .svM{font-size:9.5px;color:var(--sub2);margin-top:1px}
  .flt{display:flex;gap:5px;overflow:hidden;flex:1;min-width:0}
  .fch{font-size:10px;font-weight:700;padding:5px 11px;border-radius:20px;border:none;background:var(--tagb);color:var(--tagf);white-space:nowrap}
  .fch.on{background:var(--onchip);color:#fff}
  .catN{font-size:9.5px;background:var(--tagb);color:var(--tagf);padding:2px 9px;border-radius:20px;font-weight:700}
  .ptitle{font-size:12.5px;font-weight:800;margin-top:7px}
  .cm{font-size:9px;background:var(--pos-b);color:var(--pos-f);padding:2px 8px;border-radius:20px;font-weight:800}
  .sk{font-size:9.5px;background:var(--tagb);color:var(--tagf);padding:2px 9px;border-radius:20px;font-weight:600}
  .skOn{font-size:9.5px;background:var(--soft);color:var(--primary);padding:2px 9px;border-radius:20px;font-weight:700}
  .seg{display:flex;gap:4px;background:var(--tabbg);padding:3px;border-radius:10px}
  .segb{flex:1;font-size:10.5px;font-weight:700;padding:6px;border-radius:8px;border:none;background:transparent;color:var(--sub2)}
  .segb.on{background:var(--tabon);color:var(--ink)}
  .rec{background:var(--soft);border-radius:14px;padding:11px 12px}
  .rec .recHd{font-size:11.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:5px}
  .rec .recHd i{color:var(--primary)}
  .recCnt{background:var(--onchip);color:#fff;font-size:9px;padding:1px 8px;border-radius:20px;font-weight:800}
  .recItem{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:10px;padding:8px 10px;margin-top:8px}
  .dk .recItem{border:1px solid var(--border)}
  .recNm{font-size:11px;font-weight:800}
  .recSub{font-size:9.5px;color:var(--sub2);margin-top:1px}
  .ec{background:var(--card);border-radius:14px;box-shadow:var(--sh)}
  .dk .ec{border:1px solid var(--border)}
</style>
</head>
<body>
  <div id="light" class="theme light"></div>
  <div id="dark" class="theme dk"></div>

function stuOld(dept,common,arr){var cm=common>0?' <span class="cmOld">공통 스킬 '+common+'</span>':'';return '<div class="cardOld"><div class="rw"><div style="min-width:0"><div class="stuHd">'+dept+cm+'</div><div class="skrow">'+skills('old',arr)+'</div></div><button class="btnGrad sm"><i class="ti ti-hand-move"></i>커넥트</button></div></div>';}
function stuNew(dept,common,arr){var cm=common>0?' <span class="cm">공통 스킬 '+common+'</span>':'';return '<div class="card"><div class="rw"><div style="min-width:0"><div class="stuHd">'+dept+cm+'</div><div class="skrow">'+skills('new',arr)+'</div></div><button class="btnSolid sm"><i class="ti ti-hand-move"></i>커넥트</button></div></div>';}

/* ── 커넥트 종류 세그먼트 ── */
function segOld(){return '<div><div class="segOld"><button class="soBtn on">팀플</button><button class="soBtn">스터디</button><button class="soBtn">멘토·멘티</button></div><div class="segDesc">같은 수업에서 팀플 팀원을 찾아요. (최대 4명)</div></div>';}
function segNew(){return '<div><div class="seg"><button class="segb on">팀플</button><button class="segb">스터디</button><button class="segb">멘토·멘티</button></div><div class="segDesc">같은 수업에서 팀플 팀원을 찾아요. (최대 4명)</div></div>';}

/* ── 모집공고 ── */
function recOld(){return '<div class="recOld"><div class="recHd">📣 모집 중인 팀 2</div><div class="recItemOld"><span>알고리즘 스터디 · 2/4명</span><button class="btnGrad xs">지원</button></div><div class="recItemOld"><span>기말 프로젝트 팀 · 1/4명</span><button class="btnGrad xs">지원</button></div></div>';}
function recNew(){return '<div class="rec"><div class="recHd"><i class="ti ti-flag-3"></i>모집 중인 팀 <span class="recCnt">2</span></div><div class="recItem"><div><div class="recNm">알고리즘 스터디</div><div class="recSub">2/4명 모집 · React, 자료구조</div></div><button class="btnSolid xs">지원</button></div><div class="recItem"><div><div class="recNm">기말 프로젝트 팀</div><div class="recSub">1/4명 모집 · 백엔드 우대</div></div><button class="btnSolid xs">지원</button></div></div>';}

/* ── 미등록 CTA ── */
function enrollOld(){return '<div class="ecOld"><div class="empty"><i class="ti ti-users"></i><p>이 수업에 등록하면 같은 수업 학생을 보고<br>팀원 커넥트를 보낼 수 있어요.</p><button class="btnGrad lg">이 수업 등록하기</button></div></div>';}
function enrollNew(){return '<div class="ec"><div class="empty"><i class="ti ti-users"></i><p>이 수업에 등록하면 같은 수업 학생을 보고<br>팀원 커넥트를 보낼 수 있어요.</p><button class="btnSolid lg">이 수업 등록하기</button></div></div>';}

/* ── 학생 데이터 ── */
function students(v){return stu2(v);}
function stu2(v){var f=v==='old'?stuOld:stuNew;return f('컴퓨터공학 · 3학년',2,[{t:'React',m:1},{t:'Node.js',m:1},{t:'Figma',m:0}])+f('소프트웨어 · 2학년',0,[{t:'Python',m:0},{t:'Django',m:0}]);}
function posts2(v){var f=v==='old'?postOld:postNew;return f('족보','2022 기말 정리본 공유','시험 범위별로 정리했어요. 오타 있으면 댓글 주세요.','124')+f('과제팁','3주차 과제 접근법','분할정복으로 풀면 재귀 깊이를 줄일 수 있어요.','88');}
function posts4(v){var f=v==='old'?postOld:postNew;return posts2(v)+f('후기','중간고사 난이도 후기','개념 위주로 나와서 암기보다 이해가 중요했어요.','63')+f('스터디','주 2회 알고리즘 스터디','같이 문제 풀 사람 구해요. 초보 환영!','45');}

/* ── 탭 콘텐츠(모바일) ── */
function infoData(v){return back()+(v==='old'?heroOld():heroNew())+tabsBar('info')+'<div class="stack">'+(v==='old'?noticeOld()+surveyOld():noticeNew()+surveyNew())+(v==='old'?filterOld():filterNew())+posts2(v)+'</div>';}
function infoEmpty(v){return back()+(v==='old'?heroOld():heroNew())+tabsBar('info')+'<div class="stack">'+(v==='old'?filterOld():filterNew())+(v==='old'?postEmptyOld():postEmptyNew())+'</div>';}
function teamData(v){return back()+(v==='old'?heroOld():heroNew())+tabsBar('team')+'<div class="stack">'+(v==='old'?recOld():recNew())+'<div class="divide"><div class="ln"></div><span>또는 직접 찾기</span><div class="ln"></div></div>'+(v==='old'?segOld():segNew())+students(v)+'</div>';}
function teamEnroll(v){return back()+(v==='old'?heroOld():heroNew())+tabsBar('team')+'<div class="stack">'+(v==='old'?enrollOld():enrollNew())+'</div>';}

function mob(inner,logo){return '<div class="ph">'+mhead(logo)+'<div class="mbody">'+inner+'</div>'+mtabs()+'</div>';}

/* ── PC ── */
function pcFrame(logo,mainHtml){return '<div class="pc">'+phead(logo)+'<div class="pbody">'+pside()+mainHtml+'</div></div>';}
function pcInfoOld(logo){return pcFrame(logo,'<div class="pmain center"><div class="pcen">'+infoData('old')+'</div></div>');}
function pcInfoNew(logo){
  var top=back()+heroNew()+tabsBar('info');
  var main='<div>'+chips('new')+'<div class="cgrid2" style="margin-top:8px">'+posts4('new')+'</div></div>';
  var rail='<div class="rail"><div class="railT">수업 소식</div>'+noticeNew()+surveyNew()+'<button class="railbtn"><i class="ti ti-plus"></i>글쓰기</button></div>';
  return pcFrame(logo,'<div class="pmain"><div class="pcwrap">'+top+'<div class="pcGrid"><div>'+main+'</div>'+rail+'</div></div></div>');
}
function pcTeamOld(logo){return pcFrame(logo,'<div class="pmain center"><div class="pcen">'+teamData('old')+'</div></div>');}
function pcTeamNew(logo){
  var top=back()+heroNew()+tabsBar('team');
  var main='<div class="stack">'+students('new')+stuNew('경영학 · 3학년',1,[{t:'기획',m:1},{t:'PPT',m:0},{t:'발표',m:0}])+'</div>';
  var rail='<div class="rail">'+segNew()+'<div class="railhint">마음에 드는 팀원에게 <b>커넥트</b>를 보내면 상대 수락 시 오픈채팅으로 바로 연결돼요.</div><button class="railbtn"><i class="ti ti-link"></i>초대 링크 복사</button></div>';
  return pcFrame(logo,'<div class="pmain"><div class="pcwrap">'+top+'<div class="pcGrid"><div>'+main+'</div>'+rail+'</div></div></div>');
}

function wrap(html,cap,isNew){return '<div class="col">'+html+'<div class="cap'+(isNew?' n':'')+'">'+cap+'</div></div>';}
function pair(a,b){return '<div class="row">'+wrap(a,'기존')+wrap(b,'수정본',1)+'</div>';}

function section(label,logo){
  return '<div class="thlabel">'+label+'</div>'+
    '<div class="grp">📄 정보 탭</div>'+
    '<div class="sub">모바일 · 데이터 있음</div>'+pair(mob(infoData('old'),logo),mob(infoData('new'),logo))+
    '<div class="sub">모바일 · 빈 상태(게시글 없음)</div>'+pair(mob(infoEmpty('old'),logo),mob(infoEmpty('new'),logo))+
    '<div class="sub">PC</div>'+pair(pcInfoOld(logo),pcInfoNew(logo))+
    '<div class="grp">👥 팀원 찾기 탭</div>'+
    '<div class="sub">모바일 · 데이터 있음</div>'+pair(mob(teamData('old'),logo),mob(teamData('new'),logo))+
    '<div class="sub">모바일 · 미등록(빈 상태)</div>'+pair(mob(teamEnroll('old'),logo),mob(teamEnroll('new'),logo))+
    '<div class="sub">PC</div>'+pair(pcTeamOld(logo),pcTeamNew(logo));
}
document.getElementById('light').innerHTML=section('☀️ 라이트',LOGO_L);
document.getElementById('dark').innerHTML=section('🌙 다크',LOGO_D);
</script>
</body>
</html>
